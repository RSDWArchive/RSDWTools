<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <title>Chest Drop Tables — RSDWTools</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/shared/assets/favicon_io/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/shared/assets/favicon_io/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/shared/assets/favicon_io/favicon-16x16.png" />
  <link rel="icon" href="/shared/assets/favicon_io/favicon.ico" />
  <link rel="manifest" href="/shared/assets/favicon_io/site.webmanifest" />
  <link rel="stylesheet" href="/shared/styles.css" />
  <link rel="stylesheet" href="/shared/shared-header.css" />
  <link rel="stylesheet" href="/shared/site-shell.css" />
</head>
<body class="item-editor-page drop-page" data-tool="chest-drop-tables">
  <div id="rsdw-header-mount"></div>

  <details class="landing-logo__dropdown">
    <summary class="landing-logo__dropdown-summary">How do I use this?</summary>
    <div class="landing-logo__dropdown-content">
      <p>Select a Chest type from the drop down selector to see all of the possible drops.</p>
    </div>
  </details>

  <div class="drop-page-wrapper">
    <main class="page-layout">
      <div class="drop-page__content">
        <section class="drop-hero">
          <p class="drop-hero__subtitle">
            Select a Chest Type to view its loot rolls.
          </p>

          <select class="drop-search__input drop-search__select" id="chest-select" aria-label="Chest profile">
            <option value="">Select a Chest Type...</option>
          </select>
        </section>

        <section class="drop-results" aria-live="polite">
          <div class="drop-results__header is-hidden" hidden>
            <span class="drop-results__title" id="drop-chest-name">Select a Chest</span>
            <span class="drop-results__subtitle" id="drop-chest-subtitle"></span>
          </div>

          <div class="drop-results__body">
            <div class="drop-empty" id="drop-empty">Select a chest to see loot drops.</div>
            <table class="drop-table is-hidden" id="drop-table" hidden>
              <thead>
                <tr>
                  <th scope="col">Item</th>
                  <th scope="col">Quantity</th>
                  <th scope="col">Chance</th>
                  <th scope="col">Source</th>
                </tr>
              </thead>
              <tbody id="drop-table-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="context-menu hidden" id="context-menu" role="menu">
    <button type="button" data-action="add">Add</button>
    <button type="button" data-action="add-max">Add Max</button>
    <button type="button" data-action="set-max">Set Max</button>
    <button type="button" data-action="dupe">Dupe</button>
    <button type="button" data-action="repair">Repair</button>
    <button type="button" data-action="remove">Remove</button>
  </div>

  <div class="tooltip hidden" id="tooltip" role="tooltip">
    <div class="tooltip__name" id="tooltip-name"></div>
    <div class="tooltip__desc" id="tooltip-desc"></div>
    <div class="tooltip__meta" id="tooltip-meta"></div>
  </div>

  <div class="modal-overlay hidden" id="count-modal">
    <div class="modal">
      <div class="modal-title">Set Quantity</div>
      <div class="modal-body">
        <label>
          Quantity
          <input type="number" id="count-input" min="1" />
        </label>
        <div class="modal-hint" id="count-hint"></div>
      </div>
      <div class="modal-actions">
        <button type="button" id="count-cancel">Cancel</button>
        <button type="button" id="count-apply">Apply</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="alert-modal">
    <div class="modal">
      <div class="modal-title">Notice</div>
      <div class="modal-body">
        <div class="modal-hint" id="alert-message"></div>
      </div>
      <div class="modal-actions">
        <button type="button" id="alert-ok">OK</button>
      </div>
    </div>
  </div>

  <div id="rsdw-footer-mount"></div>

  <script src="/shared/shared-header.js" defer></script>
  <script src="/tools/chest-drop-tables/chest-drop-tables.js" defer></script>
</body>
</html>
